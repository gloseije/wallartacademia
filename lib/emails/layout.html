<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        /* Reset et styles de base */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .email-wrapper {
            background-color: #f3f4f6;
            padding: 40px 20px;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Header */
        .email-header {
            background-color: #1f2937;
            padding: 30px;
            text-align: center;
        }

        .email-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        /* Content */
        .email-content {
            padding: 40px;
        }

        .email-title {
            margin-top: 0;
            font-size: 20px;
            font-weight: 700;
            color: #111827;
        }

        .email-text {
            font-size: 16px;
            line-height: 1.6;
            color: #374151;
        }

        .email-button {
            text-align: center;
            margin: 35px 0;
        }

        .email-button a {
            background-color: #111827;
            color: #ffffff;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            display: inline-block;
        }

        .email-footer-note {
            font-size: 14px;
            line-height: 1.6;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
            margin-top: 30px;
        }

        /* OTP verification */
        .email-otp-wrapper {
            text-align: center;
            margin: 12px 0 18px 0;
        }

        .email-otp-code {
            display: inline-block;
            letter-spacing: 10px;
            font-size: 28px;
            font-weight: 800;
            padding: 14px 18px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #f9fafb;
            color: #111827;
        }

        /* Footer */
        .email-footer {
            background-color: #f3f4f6;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="email-wrapper">
        <div class="email-container">
            <!-- Header -->
            <div class="email-header">
                <h1>Wallart Academia</h1>
            </div>

            <!-- Content -->
            <div class="email-content">
                <h2 class="email-title">{{title}}</h2>
                {{content}}

                <!-- CTA Button -->
                <div class="email-button">
                    <a href="{{ctaUrl}}">{{ctaText}}</a>
                </div>

                <p class="email-footer-note">{{footerNote}}</p>
            </div>

            <!-- Footer -->
            <div class="email-footer">
                &copy; {{year}} Wallart Academia. Tous droits réservés.
            </div>
        </div>
    </div>
</body>

</html>
